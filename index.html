<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Pinterest Clone</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* Pinterest Specific Styles */
    body { background-color: #fff; color: #111; }
    
    /* Hide Scrollbar but allow scroll */
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Masonry Grid Logic */
    .masonry-grid {
        column-count: 2;
        column-gap: 16px;
    }
    @media (min-width: 640px) { .masonry-grid { column-count: 3; column-gap: 24px; } }
    @media (min-width: 1024px) { .masonry-grid { column-count: 4; column-gap: 24px; } }
    @media (min-width: 1280px) { .masonry-grid { column-count: 5; column-gap: 24px; } }
    @media (min-width: 1536px) { .masonry-grid { column-count: 6; column-gap: 24px; } }

    /* Pin Card */
    .pin-card {
        break-inside: avoid;
        margin-bottom: 16px;
        border-radius: 16px;
        overflow: hidden;
        position: relative;
        cursor: zoom-in;
    }
    
    /* Hover Overlay (Desktop) */
    .pin-overlay {
        background: rgba(0,0,0,0.4);
        opacity: 0;
        transition: opacity 0.2s;
    }
    @media (hover: hover) {
        .pin-card:hover .pin-overlay { opacity: 1; }
        .pin-card:hover img { filter: brightness(0.9); }
    }

    /* Save Button Animation */
    .btn-save { transition: transform 0.1s; }
    .btn-save:active { transform: scale(0.95); }

    /* Loader */
    .loader {
        border: 3px solid #f3f3f3;
        border-top: 3px solid #e60023;
        border-radius: 50%;
        width: 30px; height: 30px;
        animation: spin 1s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</head>
<body class="antialiased">

<!-- ================= DESKTOP HEADER ================= -->
<header class="hidden md:flex fixed top-0 w-full h-20 bg-white z-50 items-center px-4 gap-4">
    <!-- Logo -->
    <a href="#" class="flex items-center justify-center w-12 h-12 rounded-full hover:bg-gray-100 text-[#e60023] text-3xl">
        <i class="fab fa-pinterest"></i>
    </a>

    <!-- Nav Links -->
    <div class="flex gap-1">
        <button class="px-4 py-3 bg-black text-white rounded-full font-bold text-sm">Home</button>
        <button class="px-4 py-3 hover:bg-gray-100 rounded-full font-bold text-sm">Explore</button>
        <button class="px-4 py-3 hover:bg-gray-100 rounded-full font-bold text-sm">Create</button>
    </div>

    <!-- Search Bar -->
    <div class="flex-1 relative">
        <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
        <input type="text" placeholder="Search" class="w-full bg-gray-100 hover:bg-gray-200 focus:bg-white border-none rounded-full py-3 pl-12 pr-4 outline-none transition">
    </div>

    <!-- Right Icons -->
    <div class="flex items-center gap-2 text-gray-500 text-xl">
        <button class="w-12 h-12 rounded-full hover:bg-gray-100 flex items-center justify-center relative">
            <i class="fas fa-bell"></i>
            <span class="absolute top-3 right-3 w-2 h-2 bg-red-600 rounded-full"></span>
        </button>
        <button class="w-12 h-12 rounded-full hover:bg-gray-100 flex items-center justify-center">
            <i class="fas fa-comment-dots"></i>
        </button>
        <div class="w-12 h-12 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 font-bold overflow-hidden" id="desktopAvatar">
            ME
        </div>
    </div>
</header>

<!-- ================= MOBILE HEADER ================= -->
<header class="md:hidden fixed top-0 w-full h-16 bg-white z-50 flex items-center justify-between px-4 shadow-sm">
    <div class="w-10 h-10 rounded-full flex items-center justify-center text-[#e60023] text-2xl">
        <i class="fab fa-pinterest"></i>
    </div>
    <div class="flex-1 mx-4">
        <div class="bg-gray-100 rounded-full py-2 px-4 flex items-center gap-2 text-gray-500">
            <i class="fas fa-search"></i>
            <span class="text-sm">Search</span>
        </div>
    </div>
    <div class="w-10 h-10 rounded-full flex items-center justify-center text-gray-500 text-xl relative">
        <i class="fas fa-bell"></i>
        <span class="absolute top-2 right-2 w-2 h-2 bg-red-600 rounded-full border border-white"></span>
    </div>
</header>

<!-- ================= MAIN GRID FEED ================= -->
<main class="pt-20 md:pt-24 px-2 md:px-8 pb-20 md:pb-8 max-w-[2000px] mx-auto">
    <div id="grid" class="masonry-grid">
        <!-- Pins injected here via JS -->
    </div>
    
    <!-- Loading State -->
    <div id="loader" class="flex justify-center py-8">
        <div class="loader"></div>
    </div>
    
    <!-- End Message -->
    <div id="endMsg" class="hidden text-center py-10 text-gray-500 font-medium">
        <p>You're all caught up!</p>
    </div>
</main>

<!-- ================= MOBILE BOTTOM NAV ================= -->
<nav class="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 z-50 flex justify-around items-center h-16 pb-2">
    <button class="flex flex-col items-center justify-center w-full h-full text-black">
        <i class="fas fa-home text-xl"></i>
    </button>
    <button class="flex flex-col items-center justify-center w-full h-full text-gray-400">
        <i class="fas fa-search text-xl"></i>
    </button>
    <button onclick="toggleUploadModal()" class="flex flex-col items-center justify-center w-full h-full text-gray-400">
        <i class="fas fa-plus-circle text-3xl text-gray-400"></i>
    </button>
    <button class="flex flex-col items-center justify-center w-full h-full text-gray-400">
        <i class="fas fa-comment-dots text-xl"></i>
    </button>
    <button class="flex flex-col items-center justify-center w-full h-full text-gray-400">
        <div class="w-6 h-6 rounded-full bg-gray-300 flex items-center justify-center text-[10px] text-white font-bold">ME</div>
    </button>
</nav>

<!-- Floating Create Button (Mobile) -->
<button onclick="toggleUploadModal()" class="md:hidden fixed bottom-20 right-4 w-14 h-14 bg-white rounded-full shadow-lg flex items-center justify-center text-2xl text-gray-700 z-40 border border-gray-100">
    <i class="fas fa-plus"></i>
</button>

<!-- ================= UPLOAD MODAL ================= -->
<div id="uploadModal" class="fixed inset-0 bg-black bg-opacity-50 z-[60] hidden flex items-center justify-center p-4 backdrop-blur-sm">
    <div class="bg-white rounded-3xl w-full max-w-md overflow-hidden shadow-2xl transform transition-all">
        <div class="flex justify-between items-center p-4 border-b border-gray-100">
            <h2 class="text-lg font-semibold">Create Pin</h2>
            <button onclick="toggleUploadModal()" class="w-8 h-8 rounded-full hover:bg-gray-100 flex items-center justify-center">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <form id="uploadForm" class="p-6">
            <!-- File Drop Area -->
            <label class="flex flex-col items-center justify-center w-full h-48 border-2 border-dashed border-gray-300 rounded-2xl cursor-pointer hover:bg-gray-50 transition mb-4 relative overflow-hidden group">
                <div id="uploadPlaceholder" class="text-center">
                    <i class="fas fa-cloud-upload-alt text-4xl text-gray-400 mb-2"></i>
                    <p class="text-sm text-gray-500">Click to upload</p>
                </div>
                <img id="previewImg" class="absolute inset-0 w-full h-full object-cover hidden">
                <video id="previewVid" class="absolute inset-0 w-full h-full object-cover hidden" controls></video>
                <input type="file" id="fileInput" accept="image/*,video/*" class="hidden">
            </label>

            <!-- Inputs -->
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Title</label>
                    <input type="text" id="captionInput" class="w-full border-b-2 border-gray-200 focus:border-black outline-none py-2 text-lg font-bold placeholder-gray-300" placeholder="Add a title">
                </div>
            </div>

            <!-- Progress -->
            <div id="progressBox" class="hidden mt-4">
                <div class="flex justify-between text-xs text-gray-500 mb-1">
                    <span>Uploading...</span>
                    <span id="progressText">0%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                    <div id="progressFill" class="bg-red-600 h-2 rounded-full transition-all duration-200" style="width: 0%"></div>
                </div>
            </div>

            <button type="submit" id="shareBtn" disabled class="w-full mt-6 bg-gray-200 text-gray-500 font-bold py-3 rounded-full transition disabled:cursor-not-allowed hover:bg-[#e60023] hover:text-white enabled:bg-[#e60023] enabled:text-white">
                Publish
            </button>
        </form>
    </div>
</div>

<!-- ================= PREVIEW MODAL ================= -->
<div id="previewModal" class="fixed inset-0 bg-black bg-opacity-90 z-[70] hidden flex items-center justify-center p-0 md:p-8">
    <button onclick="closePreview()" class="absolute top-4 right-4 text-white text-3xl z-50 w-10 h-10 flex items-center justify-center rounded-full bg-black bg-opacity-50">&times;</button>
    <div id="previewContent" class="max-h-full max-w-full flex items-center justify-center"></div>
</div>

<script>
const API = "https://pinterest-clone-c9rz.onrender.com/api";

// State
let page = 1;
let loading = false;
let hasMore = true;
const brokenIds = new Set(JSON.parse(localStorage.getItem('pinterest_broken_cache') || '[]'));

// Elements
const grid = document.getElementById("grid");
const loader = document.getElementById("loader");
const endMsg = document.getElementById("endMsg");
const uploadModal = document.getElementById("uploadModal");
const previewModal = document.getElementById("previewModal");

/* ================= LOAD PINS ================= */
async function loadPins() {
    if (loading || !hasMore) return;
    loading = true;
    loader.classList.remove('hidden');

    try {
        const res = await fetch(`${API}/post/all?page=${page}`);
        const posts = await res.json();

        if (!posts.length) {
            hasMore = false;
            endMsg.classList.remove('hidden');
            return;
        }

        posts.forEach(post => {
            if(!post.fileUrl) return;
            const pid = post.fileUrl.split('/').pop().split('?')[0];
            if(brokenIds.has(pid)) return;
            createPin(post, pid);
        });

        page++;
    } catch (err) {
        console.error(err);
    } finally {
        loading = false;
        loader.classList.add('hidden');
    }
}

/* ================= CREATE PIN CARD ================= */
function createPin(post, pid) {
    const el = document.createElement("div");
    el.className = "pin-card group";
    
    // --- REAL USERNAME LOGIC ---
    let username = "Unknown";
    if (post.userId && post.userId.username) {
        username = post.userId.username;
    } else if (post.username) {
        username = post.username;
    }
    const initials = username.substring(0,2).toUpperCase();
    const avatarColor = `hsl(${username.length * 20}, 70%, 80%)`;

    const isVideo = post.type === 'video' || post.fileUrl.endsWith('.mp4');
    const safeUrl = post.fileUrl.replace(/"/g, '&quot;');
    const safeTitle = (post.title || "").replace(/"/g, '&quot;');

    let mediaHtml = '';
    if(isVideo) {
        mediaHtml = `<video src="${safeUrl}" class="w-full h-auto block" muted loop playsinline preload="none"></video>`;
    } else {
        mediaHtml = `<img src="${safeUrl}" class="w-full h-auto block" loading="lazy" onerror="markBroken(this, '${pid}')">`;
    }

    el.innerHTML = `
        ${mediaHtml}
        
        <!-- Hover Overlay -->
        <div class="pin-overlay absolute inset-0 flex flex-col justify-between p-3">
            <div class="flex justify-end">
                <button class="btn-save bg-[#e60023] text-white font-bold px-4 py-3 rounded-full hover:bg-[#ad081b]">
                    Save
                </button>
            </div>
            <div class="flex justify-between items-end opacity-0 group-hover:opacity-100 transition-opacity duration-200">
                <a href="#" class="bg-white bg-opacity-90 hover:bg-white p-2 rounded-full truncate max-w-[150px] text-xs font-bold flex items-center gap-2">
                    <div class="w-5 h-5 rounded-full flex items-center justify-center text-[8px] text-gray-600" style="background:${avatarColor}">${initials}</div>
                    ${username}
                </a>
                <div class="flex gap-2">
                    <button class="bg-white bg-opacity-90 hover:bg-white w-8 h-8 rounded-full flex items-center justify-center text-xs"><i class="fas fa-arrow-up"></i></button>
                    <button class="bg-white bg-opacity-90 hover:bg-white w-8 h-8 rounded-full flex items-center justify-center text-xs"><i class="fas fa-ellipsis-h"></i></button>
                </div>
            </div>
        </div>
    `;

    // Click Event
    el.onclick = () => openPreview(safeUrl, isVideo, username, safeTitle);
    
    // Video Hover Play (Desktop Only)
    if(isVideo) {
        const vid = el.querySelector('video');
        el.addEventListener('mouseenter', () => vid.play().catch(()=>{}));
        el.addEventListener('mouseleave', () => vid.pause());
    }

    grid.appendChild(el);
}

/* ================= INTERACTIONS ================= */

// Broken Image Handler
window.markBroken = function(img, id) {
    brokenIds.add(id);
    localStorage.setItem('pinterest_broken_cache', JSON.stringify([...brokenIds]));
    img.closest('.pin-card').remove();
}

// Preview Modal
function openPreview(url, isVideo, user, title) {
    const content = document.getElementById('previewContent');
    previewModal.classList.remove('hidden');
    
    if(isVideo) {
        content.innerHTML = `<video src="${url}" controls autoplay class="max-h-[90vh] max-w-[95vw] rounded-lg"></video>`;
    } else {
        content.innerHTML = `<img src="${url}" class="max-h-[90vh] max-w-[95vw] rounded-lg object-contain">`;
    }
}

window.closePreview = function() {
    previewModal.classList.add('hidden');
    document.getElementById('previewContent').innerHTML = '';
}

// Upload Modal Logic
window.toggleUploadModal = function() {
    uploadModal.classList.toggle('hidden');
}

// File Input Handling
const fileInput = document.getElementById('fileInput');
const uploadPlaceholder = document.getElementById('uploadPlaceholder');
const previewImg = document.getElementById('previewImg');
const previewVid = document.getElementById('previewVid');
const shareBtn = document.getElementById('shareBtn');

document.querySelector('label').onclick = () => fileInput.click();

fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(!file) return;
    
    const url = URL.createObjectURL(file);
    if(file.type.startsWith('video')) {
        previewVid.src = url;
        previewVid.classList.remove('hidden');
        previewImg.classList.add('hidden');
    } else {
        previewImg.src = url;
        previewImg.classList.remove('hidden');
        previewVid.classList.add('hidden');
    }
    uploadPlaceholder.classList.add('hidden');
    shareBtn.disabled = false;
});

// Upload Submission
document.getElementById('uploadForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const file = fileInput.files[0];
    if(!file) return;

    const formData = new FormData();
    formData.append('file', file);
    formData.append('title', document.getElementById('captionInput').value);

    const progressBox = document.getElementById('progressBox');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    
    progressBox.classList.remove('hidden');
    shareBtn.disabled = true;

    const xhr = new XMLHttpRequest();
    xhr.open('POST', `${API}/post/upload`);
    
    // Add Auth Token if you have one
    // const token = localStorage.getItem('token');
    // if(token) xhr.setRequestHeader('Authorization', token);

    xhr.upload.onprogress = (e) => {
        if(e.lengthComputable) {
            const percent = Math.round((e.loaded / e.total) * 100);
            progressFill.style.width = percent + '%';
            progressText.innerText = percent + '%';
        }
    };

    xhr.onload = () => {
        setTimeout(() => {
            toggleUploadModal();
            // Reset Form
            fileInput.value = '';
            document.getElementById('captionInput').value = '';
            previewImg.classList.add('hidden');
            previewVid.classList.add('hidden');
            uploadPlaceholder.classList.remove('hidden');
            progressBox.classList.add('hidden');
            progressFill.style.width = '0%';
            
            // Reload Feed
            grid.innerHTML = '';
            page = 1;
            hasMore = true;
            loadPins();
        }, 1000);
    };

    xhr.send(formData);
});

/* ================= INFINITE SCROLL ================= */
window.addEventListener('scroll', () => {
    if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 500) {
        loadPins();
    }
});

// Init
loadPins();

</script>
</body>
</html>
